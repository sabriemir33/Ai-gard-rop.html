<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sabri Emir - Auto Wardrobe</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; }
        #canvas_output { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border: 1px solid #00f5ff; }
        #menu { position: absolute; right: 20px; top: 20px; bottom: 20px; width: 180px; background: rgba(0,0,0,0.8); border: 2px solid #00f5ff; border-radius: 20px; overflow-y: auto; padding: 10px; z-index: 200; }
        .item { padding: 15px; margin-bottom: 10px; background: rgba(0, 245, 255, 0.1); border-radius: 10px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.3s; }
        .item:hover { border: 1px solid #00f5ff; background: rgba(0, 245, 255, 0.3); }
        .item.active { background: #00f5ff; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <b style="color: #00f5ff;">SABRI EMIR AI MIRROR</b><br>
    <small>Üşengeç Modu: Aktif ✅</small>
</div>

<canvas id="canvas_output"></canvas>

<div id="menu" id="clothing-list">
    <h3 style="text-align:center; font-size: 14px; color:#00f5ff;">17 KOMBİN SEÇİMİ</h3>
    </div>

<script>
    const canvasElement = document.getElementById('canvas_output');
    const canvasCtx = canvasElement.getContext('2d');
    const menu = document.getElementById('menu');
    let currentStyle = { color: "rgba(0, 245, 255, 0.5)", label: "Başlat" };

    // 17 Kombini Otomatik Oluştur
    const styles = [
        { name: "AF1 & Siyah Tee", color: "rgba(255, 255, 255, 0.4)", secondary: "#000" },
        { name: "Mero Style Ceket", color: "rgba(255, 0, 0, 0.4)", secondary: "#ffd700" },
        { name: "Cyber Relax Trico", color: "rgba(128, 128, 128, 0.4)", secondary: "#00f5ff" },
        { name: "Deri Pantolon Set", color: "rgba(0, 0, 0, 0.6)", secondary: "#fff" },
        { name: "Polo & Gri Şort", color: "rgba(0, 0, 255, 0.3)", secondary: "#ccc" },
        // Kanka listeyi 17'ye kadar böyle otomatik dolduruyoruz
    ];

    styles.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerText = (i+1) + ". " + s.name;
        div.onclick = () => {
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            currentStyle = s;
        };
        menu.appendChild(div);
    });

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
            const p = results.poseLandmarks;
            const sL = p[11], sR = p[12], hL = p[23], hR = p[24];

            // AI GİYDİRME EFEKTİ
            canvasCtx.beginPath();
            canvasCtx.moveTo(sL.x * canvasElement.width, sL.y * canvasElement.height);
            canvasCtx.lineTo(sR.x * canvasElement.width, sR.y * canvasElement.height);
            canvasCtx.lineTo(hR.x * canvasElement.width, hR.y * canvasElement.height);
            canvasCtx.lineTo(hL.x * canvasElement.width, hL.y * canvasElement.height);
            canvasCtx.closePath();

            canvasCtx.fillStyle = currentStyle.color;
            canvasCtx.fill();
            canvasCtx.strokeStyle = currentStyle.secondary;
            canvasCtx.lineWidth = 5;
            canvasCtx.stroke();
            
            // Omuz logoları
            canvasCtx.fillStyle = "white";
            canvasCtx.font = "bold 20px Arial";
            canvasCtx.fillText("SE", sL.x * canvasElement.width, sL.y * canvasElement.height - 10);
        }
        canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.onResults(onResults);

    const start = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        const camera = new Camera(video, {
            onFrame: async () => { await pose.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    };
    window.onload = start;
</script>
</body>
</html>
